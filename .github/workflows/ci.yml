name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build, vet, and test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # CGO is needed by gorm/sqlite (test harness) and the race detector.
      - name: Install C toolchain
        run: sudo apt-get install -y --no-install-recommends gcc libc6-dev

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -timeout 180s ./...

      # Run the race detector as a separate step so its failure is distinct.
      - name: Test (race detector)
        run: go test -race -timeout 300s ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Dependency vulnerability scan
  # ─────────────────────────────────────────────────────────────────────────────
  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Annotate the run but don't block merges — fix tracked separately.
      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true
